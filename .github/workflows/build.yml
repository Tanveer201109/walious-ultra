      - name: Flutter ক্লিন এবং APK বিল্ড (AGP Killer Fix)
        run: |
          echo "=== লেভেল ১: গ্রাডেল ফাইল ক্লিনআপ ==="
          sed -i 's/https\\:\/\//https:\/\//g' android/gradle/wrapper/gradle-wrapper.properties
          cat android/gradle/wrapper/gradle-wrapper.properties
          
          echo "=== লেভেল ২: AGP ভার্সন ফিক্স ==="
          sed -i 's/id "com.android.application" version ".*"/id "com.android.application" version "8.3.0"/g' android/settings.gradle
          sed -i 's/id "com.android.library" version ".*"/id "com.android.library" version "8.3.0"/g' android/settings.gradle
          echo "=== settings.gradle চেক ==="
          cat android/settings.gradle
          
          echo "=== লেভেল ৩: পুরনো ক্যাশ 100% ক্লিয়ার করা ==="
          flutter clean
          flutter pub get
          
          echo "=== লেভেল ৪: ফ্রেশ বিল্ড শুরু ==="
          flutter build apk --debug --verbose --no-tree-shake-icons
          
          echo "=== লেভেল ৫: APK খুঁজে বের করো ==="
          find . -name "*.apk" -type f

      - name: APK আপলোড
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: Walious-Ultra-Debug
          path: |
            **/*.apk
          if-no-files-found: warn
