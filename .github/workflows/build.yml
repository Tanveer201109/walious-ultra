      - name: Gradle দিয়ে APK বিল্ড (The Ultimate Force Fix)
        run: |
          echo "=== লেভেল ১: লিনাক্স কমান্ড দিয়ে ব্যাকস্ল্যাশ পরিষ্কার করা ==="
          # ফাইল থেকে সরাসরি ব্যাকস্ল্যাশ মুছে ফেলার কমান্ড
          sed -i 's/https\\:\/\//https:\/\//g' android/gradle/wrapper/gradle-wrapper.properties
          
          echo "=== লেভেল ২: ফাইল ভেরিফিকেশন (এখনই সত্য জানা যাবে) ==="
          cat android/gradle/wrapper/gradle-wrapper.properties
          
          echo "=== লেভেল ৩: পারমিশন এবং বিল্ড শুরু ==="
          cd android
          chmod +x ./gradlew
          
          echo "=== লেভেল ৪: গ্রাডেল ইঞ্জিন স্টার্ট (Stacktrace সহ) ==="
          ./gradlew assembleDebug --stacktrace --info
          cd ..
