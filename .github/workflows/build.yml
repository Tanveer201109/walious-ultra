name: Build APK
on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java 17  ← এইটা মাস্ট
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.24.5'
          channel: 'stable'
          cache: true

      - name: Fix Android Project for AGP 8  ← এইটা সব বাগ একবারে মারে
        run: |
          rm -rf android
          flutter create --platforms=android --project-name walious_ultra --org com .
          sed -i 's/compileSdk.*/compileSdk 34/' android/app/build.gradle
          sed -i 's/targetSdk.*/targetSdk 34/' android/app/build.gradle
          sed -i 's/minSdk.*/minSdk 21/' android/app/build.gradle
          sed -i 's/JavaVersion.VERSION_1_8/JavaVersion.VERSION_17/g' android/app/build.gradle
          sed -i "s/jvmTarget = '1.8'/jvmTarget = '17'/g" android/app/build.gradle

      - name: Get packages
        run: flutter pub get

      - name: Build APK
        run: flutter build apk --release

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: app-release
          path: build/app/outputs/flutter-apk/app-release.apk
