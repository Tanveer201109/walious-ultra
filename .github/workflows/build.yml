name: Build Walious Ultra Debug

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Unzip Project
        run: unzip walious_ultra.zip

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.27.4'
          channel: 'stable'
          cache: true

      - name: Get Dependencies
        run: cd walious_ultra && flutter pub get

      - name: Build Debug APK
        run: cd walious_ultra && flutter build apk --debug --verbose

      - name: Upload Debug APK
        uses: actions/upload-artifact@v4
        with:
          name: Walious-Ultra-Debug-APK
          path: walious_ultra/build/app/outputs/flutter-apk/app-debug.apk
          retention-days: 5
