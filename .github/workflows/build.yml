name: Build Flutter APK

on:
  push:
    branches: [main, master, develop]
  pull_request:
    branches: [main, master]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Setup Java JDK 11
        uses: actions/setup-java@v4
        with:
          java-version: '11'
          distribution: 'temurin'
          cache: gradle
      
      - name: Setup Flutter SDK
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.19.0'
          channel: 'stable'
          cache: true
      
      - name: Verify Flutter setup
        run: |
          flutter --version
          flutter doctor -v
      
      - name: Get Flutter dependencies
        run: flutter pub get
      
      - name: Clean previous builds
        run: |
          flutter clean
          rm -rf build/
          cd android && rm -rf .gradle && cd ..
      
      - name: Build APK Release
        run: flutter build apk --release -v
      
      - name: Check APK generation
        run: |
          if [ -f "build/app/outputs/apk/release/app-release.apk" ]; then
            echo "✅ APK generated successfully"
            ls -lh build/app/outputs/apk/release/app-release.apk
          else
            echo "❌ APK not found"
            find build -name "*.apk" 2>/dev/null || echo "No APK files found"
            exit 1
          fi
      
      - name: Upload APK
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: app-release.apk
          path: build/app/outputs/apk/release/app-release.apk
          retention-days: 30
