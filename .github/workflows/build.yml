name: Build ZAI MAIL APK
on:
  push:
    branches: [ main ]
  workflow_dispatch:
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'
          
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.24.0'
          channel: 'stable'

      - name: Create Flutter project
        run: flutter create --org com.tanveer --project-name zai_mail .

      - name: Write ZAI MAIL code
        run: |
          cat > lib/main.dart << 'EOF'
          import 'package:flutter/material.dart';
          import 'splash_screen.dart';
          void main() { runApp(const ZaiMailApp()); }
          class ZaiMailApp extends StatelessWidget {
            const ZaiMailApp({super.key});
            @override
            Widget build(BuildContext context) {
              return MaterialApp(
                debugShowCheckedModeBanner: false,
                theme: ThemeData.dark().copyWith(scaffoldBackgroundColor: const Color(0xFF0A0A0A)),
                home: const SplashScreen(),
              );
            }
          }
          EOF
          
          cat > lib/splash_screen.dart << 'EOF'
          import 'dart:math';
          import 'package:flutter/material.dart';
          import 'home_page.dart';
          class SplashScreen extends StatefulWidget {
            const SplashScreen({super.key});
            @override
            State<SplashScreen> createState() => _SplashScreenState();
          }
          class _SplashScreenState extends State<SplashScreen> with SingleTickerProviderStateMixin {
            late AnimationController _controller;
            final Random _random = Random();
            @override
            void initState() {
              super.initState();
              _controller = AnimationController(vsync: this, duration: const Duration(milliseconds: 150))..repeat();
              Future.delayed(const Duration(seconds: 3), () {
                if (mounted) Navigator.pushReplacement(context, MaterialPageRoute(builder: (context) => const HomePage()));
              });
            }
            @override
            void dispose() { _controller.dispose(); super.dispose(); }
            @override
            Widget build(BuildContext context) {
              return Scaffold(
                backgroundColor: const Color(0xFF0A0A0A),
                body: AnimatedBuilder(
                  animation: _controller,
                  builder: (context, child) {
                    return Center(
                      child: Column(
                        mainAxisAlignment: MainAxisAlignment.center,
                        children: [
                          CustomPaint(
                            size: const Size(200, 200),
                            painter: LightningBoltPainter(_controller.value, _random),
                          ),
                          const SizedBox(height: 40),
                          Row(
                            mainAxisAlignment: MainAxisAlignment.center,
                            children: [
                              Text('Z', style: TextStyle(fontSize: 48, fontWeight: FontWeight.w300, color: Colors.white.withOpacity(0.9))),
                              const SizedBox(width: 8),
                              Text('A', style: TextStyle(fontSize: 48, fontWeight: FontWeight.w300, color: Colors.white.withOpacity(0.9))),
                              const SizedBox(width: 8),
                              Text('I', style: TextStyle(fontSize: 48, fontWeight: FontWeight.w300, color: Colors.white.withOpacity(0.9))),
                            ],
                          ),
                          const SizedBox(height: 8),
                          Text('MAIL', style: TextStyle(fontSize: 16, letterSpacing: 8, color: Colors.white.withOpacity(0.6))),
                        ],
                      ),
                    );
                  },
                ),
              );
            }
          }
          class LightningBoltPainter extends CustomPainter {
            final double value; final Random random;
            LightningBoltPainter(this.value, this.random);
            @override
            void paint(Canvas canvas, Size size) {
              final paint = Paint()
                ..color = const Color(0xFF00FF88).withOpacity(0.8 + value * 0.2)
                ..strokeWidth = 4
                ..strokeCap = StrokeCap.round
                ..maskFilter = const MaskFilter.blur(BlurStyle.normal, 8);
              final path = Path();
              final center = Offset(size.width / 2, size.height / 2);
              path.moveTo(center.dx, center.dy - 60);
              path.lineTo(center.dx - 15, center.dy - 10);
              path.lineTo(center.dx + 5, center.dy - 10);
              path.lineTo(center.dx - 10, center.dy + 60);
              path.lineTo(center.dx + 15, center.dy + 10);
              path.lineTo(center.dx - 5, center.dy + 10);
              path.close();
              canvas.drawPath(path, paint);
            }
            @override
            bool shouldRepaint(LightningBoltPainter oldDelegate) => true;
          }
          EOF

          cat > lib/home_page.dart << 'EOF'
          import 'package:flutter/material.dart';
          class HomePage extends StatelessWidget {
            const HomePage({super.key});
            @override
            Widget build(BuildContext context) {
              return Scaffold(
                backgroundColor: const Color(0xFF0A0A0A),
                body: SafeArea(
                  child: Padding(
                    padding: const EdgeInsets.symmetric(horizontal: 24),
                    child: Column(
                      mainAxisAlignment: MainAxisAlignment.center,
                      crossAxisAlignment: CrossAxisAlignment.stretch,
                      children: [
                        const Icon(Icons.mail_outline, size: 80, color: Color(0xFF00FF88)),
                        const SizedBox(height: 24),
                        const Text(
                          'ZAI MAIL',
                          textAlign: TextAlign.center,
                          style: TextStyle(fontSize: 32, fontWeight: FontWeight.bold, color: Colors.white, letterSpacing: 4),
                        ),
                        const SizedBox(height: 8),
                        Text(
                          'Secure. Fast. Simple.',
                          textAlign: TextAlign.center,
                          style: TextStyle(fontSize: 14, color: Colors.white.withOpacity(0.5)),
                        ),
                        const SizedBox(height: 60),
                        ElevatedButton(
                          onPressed: () {
                            ScaffoldMessenger.of(context).showSnackBar(
                              const SnackBar(content: Text('Login pressed')),
                            );
                          },
                          style: ElevatedButton.styleFrom(
                            backgroundColor: const Color(0xFF00FF88),
                            foregroundColor: Colors.black,
                            padding: const EdgeInsets.symmetric(vertical: 16),
                            shape: RoundedRectangleBorder(borderRadius: BorderRadius.circular(12)),
                          ),
                          child: const Text('LOG IN', style: TextStyle(fontSize: 16, fontWeight: FontWeight.bold, letterSpacing: 2)),
                        ),
                        const SizedBox(height: 16),
                        OutlinedButton(
                          onPressed: () {
                            ScaffoldMessenger.of(context).showSnackBar(
                              const SnackBar(content: Text('Sign Up pressed')),
                            );
                          },
                          style: OutlinedButton.styleFrom(
                            foregroundColor: const Color(0xFF00FF88),
                            side: const BorderSide(color: Color(0xFF00FF88), width: 2),
                            padding: const EdgeInsets.symmetric(vertical: 16),
                            shape: RoundedRectangleBorder(borderRadius: BorderRadius.circular(12)),
                          ),
                          child: const Text('SIGN UP', style: TextStyle(fontSize: 16, fontWeight: FontWeight.bold, letterSpacing: 2)),
                        ),
                        const SizedBox(height: 40),
                        Text(
                          'Powered by Meta',
                          textAlign: TextAlign.center,
                          style: TextStyle(fontSize: 12, color: Colors.white.withOpacity(0.3)),
                        ),
                      ],
                    ),
                  ),
                ),
              );
            }
          }
          EOF

      - run: flutter pub get
      - run: flutter build apk --release
      
      - uses: actions/upload-artifact@v4
        with:
          name: ZAI-MAIL-APK
          path: build/app/outputs/flutter-apk/app-release.apk
