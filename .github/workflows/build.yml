name: Build Flutter APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout কোড
        uses: actions/checkout@v4

      - name: Java 17 সেটআপ
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Flutter সেটআপ
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.24.x'
          channel: 'stable'

      - name: Flutter ক্লিন এবং APK বিল্ড (AGP Universal Fix)
        run: |
          echo "=== লেভেল ১: গ্রাডেল ফাইল ক্লিনআপ ==="
          sed -i 's/https\\:\/\//https:\/\//g' android/gradle/wrapper/gradle-wrapper.properties
          cat android/gradle/wrapper/gradle-wrapper.properties
          
          echo "=== লেভেল ২: AGP ভার্সন স্মার্ট ফিক্স ==="
          # settings.gradle বা settings.gradle.kts যেখানেই থাকুক খুঁজে আপডেট করবে
          find android/ -name "settings.gradle*" -exec sed -i 's/id "com.android.application" version ".*"/id "com.android.application" version "8.3.0"/g' {} +
          find android/ -name "settings.gradle*" -exec sed -i 's/id "com.android.library" version ".*"/id "com.android.library" version "8.3.0"/g' {} +
          echo "=== settings.gradle চেক ==="
          find android/ -name "settings.gradle*" -exec cat {} +
          
          echo "=== লেভেল ৩: পুরনো ক্যাশ ক্লিয়ার করা ==="
          flutter clean
          flutter pub get
          
          echo "=== লেভেল ৪: ফ্রেশ বিল্ড শুরু ==="
          flutter build apk --debug --verbose --no-tree-shake-icons
          
          echo "=== লেভেল ৫: APK খুঁজে বের করো ==="
          find . -name "*.apk" -type f

      - name: APK আপলোড
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: Walious-Ultra-Debug
          path: |
            **/*.apk
          if-no-files-found: warn
