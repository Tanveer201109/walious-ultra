name: Build Flutter APK

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout কোড
        uses: actions/checkout@v4

      - name: Java 17 সেটআপ
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Flutter সেটআপ
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.24.x'
          channel: 'stable'

      - name: Dependencies ইনস্টল
        run: flutter pub get

      - name: Gradle দিয়ে APK বিল্ড + লজ দেখা
        run: |
          # Flutter tools ব্যবহার করাই সেরা, এটি অটোমেটিক সঠিক পাথে ফাইল রাখে
          # আর গ্রাডেলের সব ডিটেইল দেখতে --verbose ফ্ল্যাগটি যথেষ্ট
          flutter build apk --debug --verbose

      - name: APK ফাইল চেক (পাথ নিশ্চিত করা)
        run: ls -R build/app/outputs/flutter-apk/

      - name: APK আপলোড
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: debug-apk
          path: build/app/outputs/flutter-apk/*.apk
          if-no-files-found: error
