name: Build Flutter APK

on:
  push:
    branches: [main, master, develop]
  pull_request:
    branches: [main, master]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Setup Java JDK 11
        uses: actions/setup-java@v3
        with:
          java-version: '11'
          distribution: 'temurin'
          cache: gradle
      
      - name: Setup Flutter SDK
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.19.0'
          channel: 'stable'
          cache: true
      
      - name: Verify Flutter setup
        run: |
          flutter --version
          flutter doctor -v
      
      - name: Get Flutter dependencies
        run: flutter pub get
      
      - name: Run code generation (if needed)
        run: |
          if grep -q "build_runner" pubspec.yaml; then
            flutter pub run build_runner build --delete-conflicting-outputs
          fi
      
      - name: Clean previous builds
        run: |
          flutter clean
          rm -rf build/
          rm -rf android/.gradle
      
      - name: Build APK Release
        run: |
          flutter build apk \
            --release \
            --no-sound-null-safety \
            --split-per-abi \
            --verbose
      
      - name: List generated APKs
        if: success()
        run: |
          find build/app/outputs/apk -type f -name "*.apk" -exec ls -lh {} \;
      
      - name: Upload APK artifacts
        if: success()
        uses: actions/upload-artifact@v3
        with:
          name: flutter-apks
          path: build/app/outputs/apk/release/
          retention-days: 30
      
      - name: Create Release Notes
        if: success()
        run: |
          echo "## APK Build Success ✅" > release_notes.md
          echo "" >> release_notes.md
          echo "Build completed at: $(date)" >> release_notes.md
          echo "" >> release_notes.md
          echo "### APK Files Generated:" >> release_notes.md
          find build/app/outputs/apk -type f -name "*.apk" -exec ls -1h {} \; >> release_notes.md
      
      - name: Upload Release Notes
        if: success()
        uses: actions/upload-artifact@v3
        with:
          name: release-notes
          path: release_notes.md
      
      - name: Notify on failure
        if: failure()
        run: |
          echo "❌ Build failed. Check logs above for details."
          exit 1
