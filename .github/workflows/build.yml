name: Build Flutter APK

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout কোড
        uses: actions/checkout@v4

      - name: Java 17 সেটআপ
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Flutter সেটআপ
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.24.x'
          channel: stable
          cache: true

      - name: Android config যাচাই
        shell: bash
        run: |
          set -euxo pipefail

          if [ -f android/app/build.gradle ]; then
            echo "Groovy Gradle file detected"

            PACKAGE_NAME=$(grep -oP 'applicationId\s+"[^"]+"' android/app/build.gradle | head -1 | cut -d'"' -f2 || true)
            if [ -z "${PACKAGE_NAME:-}" ] && [ -f android/app/src/main/AndroidManifest.xml ]; then
              PACKAGE_NAME=$(grep -oP 'package="[^"]+"' android/app/src/main/AndroidManifest.xml | head -1 | cut -d'"' -f2 || true)
            fi

            echo "Detected package: ${PACKAGE_NAME:-not-found}"

            if [ -n "${PACKAGE_NAME:-}" ]; then
              grep -q 'namespace ' android/app/build.gradle || \
                sed -i "/android[[:space:]]*{/a\\    namespace \"$PACKAGE_NAME\"" android/app/build.gradle
            fi
          fi

      - name: Flutter clean
        run: flutter clean

      - name: Dependencies ইনস্টল
        run: flutter pub get

      - name: APK বিল্ড
        run: flutter build apk --release --verbose

      - name: APK ফাইল দেখুন
        run: ls -R build/app/outputs/flutter-apk/

      - name: APK আপলোড
        uses: actions/upload-artifact@v4
        with:
          name: app-release-apk
          path: build/app/outputs/flutter-apk/*.apk
