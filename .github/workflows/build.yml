name: Build APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: কোড চেকআউট করা
        uses: actions/checkout@v4

      - name: Java 17 সেটআপ করা
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'
          cache: 'gradle'

      - name: Flutter সেটআপ করা
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.24.3'
          
      - name: Flutter প্যাকেজ ইন্সটল
        run: flutter pub get

      - name: Debug APK বিল্ড করা
        run: flutter build apk --debug --verbose

      - name: তৈরি হওয়া APK আপলোড করা
        uses: actions/upload-artifact@v4
        with:
          name: walious-ultra-debug
          path: build/app/outputs/flutter-apk/app-debug.apk
