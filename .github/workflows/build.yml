name: Build Flutter APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout কোড
        uses: actions/checkout@v4

      - name: Java 17 সেটআপ
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Flutter সেটআপ
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.24.x'
          channel: 'stable'

      - name: Flutter ক্লিন এবং APK বিল্ড (AGP + Namespace + Auto Package Fix)
        run: |
          echo "=== লেভেল ১: গ্রাডেল ফাইল ক্লিনআপ ==="
          sed -i 's/https\\:\/\//https:\/\//g' android/gradle/wrapper/gradle-wrapper.properties
          
          echo "=== লেভেল ২: AGP ভার্সন মাস্টার ফিক্স ==="
          find android/ -name "settings.gradle*" -exec sed -i 's/id "com.android.application" version ".*"/id "com.android.application" version "8.3.0"/g' {} +
          find android/ -name "settings.gradle*" -exec sed -i 's/id "com.android.library" version ".*"/id "com.android.library" version "8.3.0"/g' {} +
          
          if [ -f android/build.gradle ]; then
            sed -i 's/com.android.tools.build:gradle:.*"/com.android.tools.build:gradle:8.3.0"/g' android/build.gradle
          fi

          echo "=== লেভেল ২.৫: Namespace + SDK অটো ফিক্স ==="
          PACKAGE_NAME=$(grep "applicationId" android/app/build.gradle | head -1 | awk -F'"' '{print $2}')
          if [ -z "$PACKAGE_NAME" ]; then
            PACKAGE_NAME=$(grep "package=" android/app/src/main/AndroidManifest.xml | awk -F'"' '{print $2}')
          fi
          if [ -z "$PACKAGE_NAME" ]; then
            PACKAGE_NAME="com.example.walious_ultra"
          fi
          echo "Detected Package Name: $PACKAGE_NAME"
          
          sed -i 's/compileSdkVersion .*/compileSdkVersion 34/g' android/app/build.gradle
          sed -i 's/targetSdkVersion .*/targetSdkVersion 34/g' android/app/build.gradle
          sed -i 's/minSdkVersion .*/minSdkVersion 21/g' android/app/build.gradle
          
          if grep -q "namespace" android/app/build.gradle; then
            sed -i "s/namespace \".*\"/namespace \"$PACKAGE_NAME\"/g" android/app/build.gradle
          else
            sed -i "/android[ ]*{/a \    namespace \"$PACKAGE_NAME\"" android/app/build.gradle
          fi
          
          echo "=== app/build.gradle চেক ==="
          grep -A 15 "android {" android/app/build.gradle
          
          echo "=== লেভেল ৩: ফ্রেশ ক্লিনআপ ও বিল্ড শুরু ==="
          flutter clean
          flutter pub get
          flutter build apk --debug --verbose --no-tree-shake-icons
          
          echo "=== লেভেল ৪: এপিকে ভেরিফিকেশন ==="
          ls -R build/app/outputs/flutter-apk/

      - name: APK ডাউনলোড লিঙ্ক জেনারেট (Upload Artifact)
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: Walious-Ultra-Final-APK
          path: build/app/outputs/flutter-apk/*.apk
          retention-days: 7
