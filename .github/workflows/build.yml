name: Build Flutter APK

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout কোড
        uses: actions/checkout@v4

      - name: Java 17 সেটআপ
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Flutter সেটআপ
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.24.x'
          channel: 'stable'

      - name: Dependencies ইনস্টল
        run: flutter pub get

      - name: Flutter দিয়ে APK বিল্ড (The Ultimate Fix)
        run: |
          echo "=== লেভেল ১: ব্যাকস্ল্যাশ ক্লিনআপ সার্জারি ==="
          sed -i 's/https\\:\/\//https:\/\//g' android/gradle/wrapper/gradle-wrapper.properties
          echo "=== ক্লিনআপ শেষ, ফাইল চেক ==="
          cat android/gradle/wrapper/gradle-wrapper.properties
          
          echo "=== লেভেল ২: ফ্লাটার বিল্ড শুরু (এটি ২-৫ মিনিট সময় নেবে) ==="
          flutter build apk --debug --verbose
          
      - name: APK আপলোড
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: debug-apk
          path: build/app/outputs/flutter-apk/app-debug.apk
          if-no-files-found: warn
