name: Build Flutter APK

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Java 17 সেটআপ করা
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Flutter সেটআপ করা
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.24.x'
          channel: 'stable'

      - name: Flutter Dependencies ইনস্টল করা
        run: flutter pub get

      - name: Debug APK বিল্ড করা
        run: |
          flutter clean
          flutter pub get
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug --stacktrace --info

      - name: APK আপলোড করা
        uses: actions/upload-artifact@v4
        with:
          name: debug-apk
          path: android/app/build/outputs/apk/debug/
