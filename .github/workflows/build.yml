name: Build Flutter APK

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Java 17 সেটআপ
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Flutter সেটআপ
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.24.x'
          channel: 'stable'

      - name: Dependencies ইনস্টল
        run: flutter pub get

      - name: Debug APK বিল্ড
        run: |
          flutter clean
          flutter pub get
          flutter build apk --debug --no-shrink --verbose

      - name: APK আপলোড (যাতে দেখা যায় APK তৈরি হয়েছে কি না)
        uses: actions/upload-artifact@v4
        with:
          name: debug-apk
          path: build/app/outputs/flutter-apk/app-debug.apk
