name: Build Walious Ultra APK

on:
  workflow_dispatch:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Unzip Project
        run: unzip -o walious_ultra.zip

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.27.4'
          channel: 'stable'

      - name: Get dependencies
        run: cd walious_ultra && flutter pub get

      - name: Build Release APK
        run: cd walious_ultra && flutter build apk --release

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: Walious-Ultra-Release-APK
          path: walious_ultra/build/app/outputs/flutter-apk/app-release.apk
