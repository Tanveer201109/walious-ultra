name: Build APK
on:
  push:
    branches: [ main ]
  workflow_dispatch:
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Delete old project files
        run: |
          rm -rf lib android ios test pubspec.yaml pubspec.lock
          
      - uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'
          
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.24.0'
          channel: 'stable'

      - name: Create fresh Flutter project
        run: flutter create --org com.tanveer --project-name zai_mail .

      - name: Write your code
        run: |
          cat > lib/main.dart << 'EOF'
          import 'package:flutter/material.dart';
          import 'splash_screen.dart';
          void main() { runApp(const ZAiMailApp()); }
          class ZAiMailApp extends StatelessWidget {
            const ZAiMailApp({super.key});
            @override
            Widget build(BuildContext context) {
              return MaterialApp(
                debugShowCheckedModeBanner: false,
                theme: ThemeData.dark().copyWith(scaffoldBackgroundColor: const Color(0xFF080808)),
                home: const SplashScreen(),
              );
            }
          }
          EOF
          
          cat > lib/splash_screen.dart << 'EOF'
          import 'dart:math';
          import 'package:flutter/material.dart';
          import 'ring_painter.dart';
          import 'lightning_painter.dart';
          import 'home_page.dart';
          class SplashScreen extends StatefulWidget {
            const SplashScreen({super.key});
            @override
            State<SplashScreen> createState() => _SplashScreenState();
          }
          class _SplashScreenState extends State<SplashScreen> with TickerProviderStateMixin {
            late AnimationController _ringController, _haloController, _flashController;
            final Random _random = Random();
            @override
            void initState() {
              super.initState();
              _ringController = AnimationController(vsync: this, duration: const Duration(seconds: 8))..repeat();
              _haloController = AnimationController(vsync: this, duration: const Duration(milliseconds: 2500))..repeat(reverse: true);
              _flashController = AnimationController(vsync: this, duration: const Duration(milliseconds: 120));
              _startLightningLoop();
              Future.delayed(const Duration(seconds: 4), () {
                if (mounted) Navigator.pushReplacement(context, MaterialPageRoute(builder: (context) => const HomePage()));
              });
            }
            void _startLightningLoop() async {
              await Future.delayed(const Duration(milliseconds: 600));
              while (mounted) {
                int burstSize = _random.nextInt(3) + 2;
                for (int i = 0; i < burstSize; i++) {
                  if (!mounted) return;
                  _flashController.forward(from: 0);
                  await Future.delayed(Duration(milliseconds: 60 + _random.nextInt(70)));
                }
                await Future.delayed(Duration(milliseconds: 1500 + _random.nextInt(2000)));
              }
            }
            @override
            void dispose() {
              _ringController.dispose(); _haloController.dispose(); _flashController.dispose();
              super.dispose();
            }
            @override
            Widget build(BuildContext context) {
              return Scaffold(
                backgroundColor: const Color(0xFF080808),
                body: AnimatedBuilder(
                  animation: _flashController,
                  builder: (context, child) {
                    return Stack(
                      children: [
                        if (_flashController.value > 0) Container(color: const Color(0xFFB4DCFF).withOpacity(0.18 * _flashController.value)),
                        Center(
                          child: SizedBox(
                            width: 320, height: 320,
                            child: Stack(
                              alignment: Alignment.center,
                              children: [
                                ScaleTransition(
                                  scale: Tween(begin: 1.0, end: 1.15).animate(CurvedAnimation(parent: _haloController, curve: Curves.easeInOut)),
                                  child: Container(width: 320, height: 320, decoration: BoxDecoration(shape: BoxShape.circle, gradient: RadialGradient(colors: [const Color(0xFFD4AF37).withOpacity(0.08), Colors.transparent]))),
                                ),
                                RotationTransition(turns: _ringController, child: CustomPaint(size: const Size(280, 280), painter: RingPainter())),
                                ClipOval(child: SizedBox(width: 274, height: 274, child: CustomPaint(painter: LightningPainter(_flashController.value, _random)))),
                                Column(
                                  mainAxisSize: MainAxisSize.min,
                                  children: [
                                    Text('Tanveer ভাই', style: TextStyle(color: const Color(0xFF0081FB).withOpacity(0.6), fontSize: 14, fontWeight: FontWeight.w500, letterSpacing: 1.2)),
                                    const SizedBox(height: 12),
                                    RichText(text: TextSpan(style: const TextStyle(fontFamily: 'Georgia', fontSize: 48), children: [
                                      TextSpan(text: '[', style: TextStyle(color: const Color(0xFFC8C8C8), fontWeight: FontWeight.w300, letterSpacing: -2, shadows: [Shadow(color: Colors.grey.withOpacity(0.6), blurRadius: 20)])),
                                      const TextSpan(text: '১৮ ULTRA AI', style: TextStyle(fontSize: 48, fontWeight: FontWeight.bold, color: Colors.white, shadows: [Shadow(color: Colors.white, blurRadius: 8)])),
                                      TextSpan(text: ']', style: TextStyle(color: const Color(0xFFC8C8C8), fontWeight: FontWeight.w300, letterSpacing: -2, shadows: [Shadow(color: Colors.grey.withOpacity(0.6), blurRadius: 20)])),
                                    ])),
                                    const SizedBox(height: 6),
                                    Text('THE FAITH STANDARD', style: TextStyle(fontSize: 11, letterSpacing: 4, color: const Color(0xFFD4AF37).withOpacity(0.8), shadows: [Shadow(color: const Color(0xFFD4AF37).withOpacity(0.5), blurRadius: 10)])),
                                  ],
                                ),
                              ],
                            ),
                          ),
                        ),
                        Positioned(bottom: 40, left: 0, right: 0, child: Row(mainAxisAlignment: MainAxisAlignment.center, children: [
                          Text('Powered by ', style: TextStyle(color: Colors.white.withOpacity(0.3), fontSize: 11, letterSpacing: 1.5)),
                          Text('Meta', style: TextStyle(color: const Color(0xFF0081FB).withOpacity(0.5), fontSize: 11, fontWeight: FontWeight.w600, letterSpacing: 1.5)),
                        ])),
                      ],
                    );
                  },
                ),
              );
            }
          }
          EOF

          cat > lib/ring_painter.dart << 'EOF'
          import 'package:flutter/material.dart';
          class RingPainter extends CustomPainter {
            @override
            void paint(Canvas canvas, Size size) {
              final center = Offset(size.width / 2, size.height / 2);
              final radius = size.width / 2;
              final paint = Paint()..shader = const LinearGradient(colors: [Color(0xFFFFD700), Color(0xFFD4AF37), Color(0xFFFFD700)]).createShader(Rect.fromCircle(center: center, radius: radius))..style = PaintingStyle.stroke..strokeWidth = 6.0..maskFilter = const MaskFilter.blur(BlurStyle.outer, 3);
              canvas.drawCircle(center, radius, paint);
              final innerPaint = Paint()..color = const Color(0xFFFFD700).withOpacity(0.3)..style = PaintingStyle.stroke..strokeWidth = 1.5;
              canvas.drawCircle(center, radius - 10, innerPaint);
              canvas.drawCircle(center, radius + 10, innerPaint);
            }
            @override
            bool shouldRepaint(CustomPainter oldDelegate) => false;
          }
          EOF

          cat > lib/lightning_painter.dart << 'EOF'
          import 'package:flutter/material.dart';
          import 'dart:math';
          class LightningPainter extends CustomPainter {
            final double flash; final Random random;
            LightningPainter(this.flash, this.random);
            @override
            void paint(Canvas canvas, Size size) {
              if (flash == 0) return;
              final paint = Paint()..color = const Color(0xFFB4DCFF).withOpacity(flash)..strokeWidth = 2.5..strokeCap = StrokeCap.round..maskFilter = const MaskFilter.blur(BlurStyle.normal, 4);
              final path = Path(); final center = Offset(size.width / 2, size.height / 2);
              for (int i = 0; i < 2; i++) {
                path.reset();
                var startX = center.dx + (random.nextDouble() - 0.5) * size.width * 0.8;
                var startY = center.dy + (random.nextDouble() - 0.5) * size.height * 0.8;
                path.moveTo(startX, startY); var currentX = startX; var currentY = startY;
                for (int j = 0; j < 6; j++) {
                  currentX += (random.nextDouble() - 0.5) * 40; currentY += (random.nextDouble() - 0.5) * 40;
                  path.lineTo(currentX, currentY);
                }
                canvas.drawPath(path, paint);
              }
            }
            @override
            bool shouldRepaint(LightningPainter oldDelegate) => oldDelegate.flash != flash;
          }
          EOF

          cat > lib/home_page.dart << 'EOF'
          import 'package:flutter/material.dart';
          class HomePage extends StatelessWidget {
            const HomePage({super.key});
            @override
            Widget build(BuildContext context) {
              return const Scaffold(
                backgroundColor: Color(0xFF080808),
                body: Center(child: Text('18 ULTRA AI Home', style: TextStyle(fontSize: 24, color: Colors.white, fontWeight: FontWeight.bold))),
              );
            }
          }
          EOF

      - run: flutter pub get
      - run: flutter build apk --release
      
      - uses: actions/upload-artifact@v4
        with:
          name: 18-ULTRA-AI
          path: build/app/outputs/flutter-apk/app-release.apk
