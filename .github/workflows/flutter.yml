- name: 1. Create fresh Flutter project in root
  run: flutter create --org com.zaimail --project-name zai_mail --platforms android .

- name: 1.1 Fix Gradle SDK versions
  run: |
    sed -i 's/flutter.minSdkVersion=.*/flutter.minSdkVersion=23/' android/local.properties
    sed -i 's/flutter.compileSdkVersion=.*/flutter.compileSdkVersion=34/' android/local.properties
    sed -i 's/compileSdkVersion flutter.compileSdkVersion/compileSdkVersion 34/' android/app/build.gradle
    sed -i 's/minSdkVersion flutter.minSdkVersion/minSdkVersion 23/' android/app/build.gradle

- name: 2. Write lib/main.dart
  run: |
    cat > lib/main.dart << 'EOF'
    import 'package:flutter/material.dart';

    void main() {
      runApp(MyApp());
    }

    class MyApp extends StatelessWidget {
      @override
      Widget build(BuildContext context) {
        return MaterialApp(
          title: 'xAi Wallet',
          theme: ThemeData(
            primarySwatch: Colors.blue,
          ),
          home: SplashScreen(),
        );
      }
    }
    EOF

- name: 3. Write lib/splash_screen.dart
  run: |
    cat > lib/splash_screen.dart << 'EOF'
    import 'package:flutter/material.dart';

    class SplashScreen extends StatefulWidget {
      @override
      _SplashScreenState createState() => _SplashScreenState();
    }

    class _SplashScreenState extends State<SplashScreen> {
      @override
      void initState() {
        super.initState();
        Future.delayed(Duration(seconds: 3), () {
          Navigator.pushReplacement(
            context,
            MaterialPageRoute(builder: (context) => HomePage()),
          );
        });
      }

      @override
      Widget build(BuildContext context) {
        return Scaffold(
          body: Center(
            child: Text('xAi Wallet'),
          ),
        );
      }
    }
    EOF

- name: 4. Write lib/home_page.dart
  run: |
    cat > lib/home_page.dart << 'EOF'
    import 'package:flutter/material.dart';

    class HomePage extends StatefulWidget {
      @override
      _HomePageState createState() => _HomePageState();
    }

    class _HomePageState extends State<HomePage> {
      @override
      Widget build(BuildContext context) {
        return Scaffold(
          body: Center(
            child: Column(
              mainAxisAlignment: MainAxisAlignment.center,
              children: <Widget>[
                Text('xAi Wallet'),
                SizedBox(height: 20),
                Image.asset('assets/ring.png', width: 100, height: 100),
                SizedBox(height: 20),
                Text('Ring Color: Redium Smoke'),
              ],
            ),
          ),
        );
      }
    }
    EOF

- name: 5. Build APK
  run: |
    flutter pub get
    flutter build apk --release

- name: 6. Upload ZAI MAIL APK
  uses: actions/upload-artifact@v4
  with:
    name: ZAI-MAIL-GREEN-APK
    path: build/app/outputs/flutter-apk/app-release.apk
    if-no-files-found: error
