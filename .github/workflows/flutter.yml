name: Flutter ZAI MAIL Build

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: 1. Checkout repo
        uses: actions/checkout@v4

      - name: 2. Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: 3. Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.24.0'
          channel: 'stable'

      - name: 4. Create fresh Flutter project
        run: flutter create --org com.zaimail --project-name zai_mail --platforms android .

      - name: 5. Get dependencies
        run: flutter pub get

      - name: 6. Add auth packages
        run: |
          flutter pub add firebase_core
          flutter pub add firebase_auth
          flutter pub add google_sign_in
          flutter pub add flutter_facebook_auth

      - name: 7. Replace home_page.dart
        run: |
          cat > lib/home_page.dart << 'EOF'
          import 'package:flutter/material.dart';
          import 'package:firebase_auth/firebase_auth.dart';
          import 'package:google_sign_in/google_sign_in.dart';
          import 'package:flutter_facebook_auth/flutter_facebook_auth.dart';

          class HomePage extends StatelessWidget {
            const HomePage({super.key});

            @override
            Widget build(BuildContext context) {
              return Scaffold(
                body: Center(
                  child: Padding(
                    padding: const EdgeInsets.all(24.0),
                    child: Column(
                      mainAxisAlignment: MainAxisAlignment.center,
                      crossAxisAlignment: CrossAxisAlignment.stretch,
                      children: [
                        Icon(Icons.flash_on, size: 80, color: const Color(0xFF00FF88)),
                        const SizedBox(height: 24),
                        const Text('ZAI MAIL', textAlign: TextAlign.center, style: TextStyle(fontSize: 32, fontWeight: FontWeight.bold, letterSpacing: 2)),
                        const Text('Secure. Fast. Yours.', textAlign: TextAlign.center, style: TextStyle(fontSize: 16, color: Colors.grey)),
                        const SizedBox(height: 50),
                        ElevatedButton.icon(
                          onPressed: () => _handleGoogleSignIn(context),
                          icon: const Icon(Icons.g_mobiledata, color: Colors.black, size: 28),
                          label: const Text('Continue with Google'),
                          style: ElevatedButton.styleFrom(backgroundColor: Colors.white, foregroundColor: Colors.black, padding: const EdgeInsets.symmetric(vertical: 14), shape: RoundedRectangleBorder(borderRadius: BorderRadius.circular(8))),
                        ),
                        const SizedBox(height: 12),
                        ElevatedButton.icon(
                          onPressed: () => _handleFacebookSignIn(context),
                          icon: const Icon(Icons.facebook, color: Colors.white),
                          label: const Text('Continue with Facebook'),
                          style: ElevatedButton.styleFrom(backgroundColor: const Color(0xFF1877F2), foregroundColor: Colors.white, padding: const EdgeInsets.symmetric(vertical: 14), shape: RoundedRectangleBorder(borderRadius: BorderRadius.circular(8))),
                        ),
                        const SizedBox(height: 12),
                        OutlinedButton.icon(
                          onPressed: () => _handleZaiMailCreate(context),
                          icon: const Icon(Icons.mail, color: Color(0xFF00FF88)),
                          label: const Text('Create ZAI MAIL Account'),
                          style: OutlinedButton.styleFrom(foregroundColor: const Color(0xFF00FF88), side: const BorderSide(color: Color(0xFF00FF88), width: 1.5), padding: const EdgeInsets.symmetric(vertical: 14), shape: RoundedRectangleBorder(borderRadius: BorderRadius.circular(8))),
                        ),
                        const SizedBox(height: 20),
                        Row(children: const [Expanded(child: Divider(color: Colors.grey)), Padding(padding: EdgeInsets.symmetric(horizontal: 8.0), child: Text('OR', style: TextStyle(color: Colors.grey))), Expanded(child: Divider(color: Colors.grey))]),
                        const SizedBox(height: 20),
                        ElevatedButton(
                          onPressed: () => _handleLogin(context),
                          style: ElevatedButton.styleFrom(backgroundColor: const Color(0xFF00FF88), foregroundColor: Colors.black, padding: const EdgeInsets.symmetric(vertical: 14), shape: RoundedRectangleBorder(borderRadius: BorderRadius.circular(8))),
                          child: const Text('Login', style: TextStyle(fontSize: 16, fontWeight: FontWeight.bold)),
                        ),
                      ],
                    ),
                  ),
                ),
              );
            }

            Future<void> _handleGoogleSignIn(BuildContext context) async {
              try {
                _showSnack(context, 'Signing in with Google...');
                final GoogleSignInAccount? googleUser = await GoogleSignIn().signIn();
                if (googleUser == null) return;
                final GoogleSignInAuthentication googleAuth = await googleUser.authentication;
                final credential = GoogleAuthProvider.credential(accessToken: googleAuth.accessToken, idToken: googleAuth.idToken);
                await FirebaseAuth.instance.signInWithCredential(credential);
                _showSnack(context, 'Google Sign In Success');
              } catch (e) {
                _showSnack(context, 'Google Sign In Failed: $e');
              }
            }

            Future<void> _handleFacebookSignIn(BuildContext context) async {
              try {
                _showSnack(context, 'Signing in with Facebook...');
                final LoginResult result = await FacebookAuth.instance.login();
                if (result.status == LoginStatus.success) {
                  final AccessToken accessToken = result.accessToken!;
                  final OAuthCredential credential = FacebookAuthProvider.credential(accessToken.tokenString);
                  await FirebaseAuth.instance.signInWithCredential(credential);
                  _showSnack(context, 'Facebook Sign In Success');
                } else {
                  _showSnack(context, 'Facebook Sign In Cancelled');
                }
              } catch (e) {
                _showSnack(context, 'Facebook Sign In Failed: $e');
              }
            }

            void _handleZaiMailCreate(BuildContext context) {
              _showSnack(context, 'Opening Register Page...');
            }

            void _handleLogin(BuildContext context) {
              _showSnack(context, 'Opening Login Page...');
            }

            void _showSnack(BuildContext context, String msg) {
              ScaffoldMessenger.of(context).showSnackBar(SnackBar(content: Text(msg), behavior: SnackBarBehavior.floating, shape: RoundedRectangleBorder(borderRadius: BorderRadius.circular(8))));
            }
          }
          EOF

      - name: 8. Update main.dart to use HomePage
        run: |
          sed -i 's/home: const MyHomePage.*/home: const HomePage(),/' lib/main.dart
          sed -i '1i import '\''package:zai_mail/home_page.dart'\'';' lib/main.dart

      - name: 9. Build APK
        run: flutter build apk --release

      - name: 10. Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: zai-mail-release-apk
          path: build/app/outputs/flutter-apk/app-release.apk
