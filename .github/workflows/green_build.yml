name: xAI Wallet

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: 0. Checkout repo
        uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Setup Flutter 3.24
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.24.0'
          channel: 'stable'

      - name: 1. Create fresh Flutter project
        run: flutter create --org com.xaiwallet --project-name xai_wallet --platforms android --overwrite .

      - name: 2. Update pubspec.yaml with all deps
        run: |
          cat > pubspec.yaml << 'EOF'
          name: xai_wallet
          description: X CHAIN WALLET
          publish_to: 'none'
          version: 1.0.0+1

          environment:
            sdk: '>=3.5.0 <4.0.0'

          dependencies:
            flutter:
              sdk: flutter
            cupertino_icons: ^1.0.8
            firebase_core: ^3.8.0
            firebase_auth: ^5.3.3
            google_sign_in: ^6.2
            flutter_facebook_auth: ^7.1.1
            http: ^1.2.2

          dev_dependencies:
            flutter_test:
              sdk: flutter
            flutter_lints: ^3.0.0

          flutter:
            uses-material-design: true
          EOF

      - name: 3. Clean and get dependencies
        run: |
          flutter clean
          flutter pub get

      - name: 4. Fix Gradle + Add Facebook App ID
        run: |
          # SDK versions
          sed -i 's/flutter.minSdkVersion=.*/flutter.minSdkVersion=23/' android/local.properties
          sed -i 's/flutter.compileSdkVersion=.*/flutter.compileSdkVersion=34/' android/local.properties
          sed -i 's/compileSdkVersion flutter.compileSdkVersion/compileSdkVersion 34/' android/app/build.gradle
          sed -i 's/minSdkVersion flutter.minSdkVersion/minSdkVersion 23/' android/app/build.gradle
          
          # Facebook App ID + Client Token - তোমার আসল ID বসাও
          sed -i '/<\/application>/i \        <meta-data android:name="com.facebook.sdk.ApplicationId" android:value="@string/facebook_app_id"\/>\n        <meta-data android:name="com.facebook.sdk.ClientToken" android:value="@string/facebook_client_token"\/>' android/app/src/main/AndroidManifest.xml
          
          # strings.xml বানাও
          mkdir -p android/app/src/main/res/values
          cat > android/app/src/main/res/values/strings.xml << 'EOF'
          <?xml version="1.0" encoding="utf-8"?>
          <resources>
              <string name="facebook_app_id">YOUR_FACEBOOK_APP_ID</string>
              <string name="facebook_client_token">YOUR_FACEBOOK_CLIENT_TOKEN</string>
          </resources>
          EOF

      - name: 5. Write lib/main.dart
        run: |
          cat > lib/main.dart << 'EOF'
          import 'package:flutter/material.dart';
          import 'package:firebase_core/firebase_core.dart';
          import 'splash_screen.dart';

          void main() async {
            WidgetsFlutterBinding.ensureInitialized();
            await Firebase.initializeApp();
            runApp(const XaiWalletApp());
          }

          class XaiWalletApp extends StatelessWidget {
            const XaiWalletApp({super.key});
            @override
            Widget build(BuildContext context) {
              return MaterialApp(
                debugShowCheckedModeBanner: false,
                theme: ThemeData.dark().copyWith(
                  scaffoldBackgroundColor: const Color(0xFF0A0A0A),
                ),
                home: const SplashScreen(),
              );
            }
          }
          EOF

      - name: 6. Write lib/splash_screen.dart
        run: |
          cat > lib/splash_screen.dart << 'EOF'
          import 'dart:math';
          import 'package:flutter/material.dart';
          import 'home_page.dart';

          class SplashScreen extends StatefulWidget {
            const SplashScreen({super.key});
            @override
            State<SplashScreen> createState() => _SplashScreenState();
          }

          class _SplashScreenState extends State<SplashScreen>
              with SingleTickerProviderStateMixin {
            late AnimationController _controller;

            @override
            void initState() {
              super.initState();
              _controller = AnimationController(
                vsync: this,
                duration: const Duration(milliseconds: 150),
              )..repeat(reverse: true);

              Future.delayed(const Duration(seconds: 3), () {
                if (mounted) {
                  Navigator.pushReplacement(
                    context,
                    MaterialPageRoute(builder: (context) => const HomePage()),
                  );
                }
              });
            }

            @override
            void dispose() {
              _controller.dispose();
              super.dispose();
            }

            @override
            Widget build(BuildContext context) {
              return Scaffold(
                backgroundColor: const Color(0xFF0A0A0A),
                body: AnimatedBuilder(
                  animation: _controller,
                  builder: (context, child) {
                    return Center(
                      child: Column(
                        mainAxisAlignment: MainAxisAlignment.center,
                        children: [
                          Container(
                            width: 200,
                            height: 200,
                            decoration: BoxDecoration(
                              shape: BoxShape.circle,
                              gradient: RadialGradient(
                                colors: [
                                  const Color(0xFF00FF88).withOpacity(0.15 + _controller.value * 0.1),
                                  Colors.transparent,
                                ],
                              ),
                            ),
                            child: CustomPaint(
                              size: const Size(200, 200),
                              painter: GreenLightningPainter(_controller.value),
                            ),
                          ),
                          const SizedBox(height: 40),
                          Row(
                            mainAxisAlignment: MainAxisAlignment.center,
                            children: [
                              Text('X', style: TextStyle(fontSize: 48, fontWeight: FontWeight.w300, color: Colors.white.withOpacity(0.9), letterSpacing: 12)),
                              Text('A', style: TextStyle(fontSize: 48, fontWeight: FontWeight.w300, color: Colors.white.withOpacity(0.9), letterSpacing: 12)),
                              Text('I', style: TextStyle(fontSize: 48, fontWeight: FontWeight.w300, color: Colors.white.withOpacity(0.9))),
                            ],
                          ),
                          const SizedBox(height: 8),
                          Text('WALLET', style: TextStyle(fontSize: 16, letterSpacing: 8, color: Colors.white.withOpacity(0.6), fontWeight: FontWeight.w300)),
                        ],
                      ),
                    );
                  },
                ),
              );
            }
          }

          class GreenLightningPainter extends CustomPainter {
            final double value;
            GreenLightningPainter(this.value);

            @override
            void paint(Canvas canvas, Size size) {
              final paint = Paint()
                ..color = const Color(0xFF00FF88).withOpacity(0.8 + value * 0.2)
                ..strokeWidth = 4
                ..strokeCap = StrokeCap.round
                ..maskFilter = const MaskFilter.blur(BlurStyle.normal, 8)
                ..style = PaintingStyle.fill;

              final path = Path();
              final center = Offset(size.width / 2, size.height / 2);

              path.moveTo(center.dx, center.dy - 60);
              path.lineTo(center.dx - 15, center.dy - 10);
              path.lineTo(center.dx + 5, center.dy - 10);
              path.lineTo(center.dx - 10, center.dy + 60);
              path.lineTo(center.dx + 15, center.dy + 10);
              path.lineTo(center.dx - 5, center.dy + 10);
              path.close();

              canvas.drawPath(path, paint);

              final glowPaint = Paint()
                ..color = const Color(0xFF00FF88).withOpacity(0.3)
                ..maskFilter = const MaskFilter.blur(BlurStyle.normal, 20);
              canvas.drawPath(path, glowPaint);
            }

            @override
            bool shouldRepaint(GreenLightningPainter oldDelegate) => true;
          }
          EOF

      - name: 7. Write lib/home_page.dart
        run: |
          cat > lib/home_page.dart << 'EOF'
          import 'package:flutter/material.dart';
          import 'package:firebase_auth/firebase_auth.dart';
          import 'package:google_sign_in/google_sign_in.dart';
          import 'package:flutter_facebook_auth/flutter_facebook_auth.dart';

          class HomePage extends StatelessWidget {
            const HomePage({super.key});

            Future<void> _handleGoogleSignIn(BuildContext context) async {
              try {
                final GoogleSignInAccount? googleUser = await GoogleSignIn().signIn();
                if (googleUser == null) return;
                final GoogleSignInAuthentication googleAuth = await googleUser.authentication;
                final credential = GoogleAuthProvider.credential(
                  accessToken: googleAuth.accessToken,
                  idToken: googleAuth.idToken,
                );
                await FirebaseAuth.instance.signInWithCredential(credential);
                _showSnack(context, 'Google Sign In Success!');
              } catch (e) {
                _showSnack(context, 'Google Sign In Failed: $e');
              }
            }

            Future<void> _handleFacebookSignIn(BuildContext context) async {
              try {
                final LoginResult result = await FacebookAuth.instance.login();
                if (result.status == LoginStatus.success) {
                  final OAuthCredential credential = FacebookAuthProvider.credential(result.accessToken!.tokenString);
                  await FirebaseAuth.instance.signInWithCredential(credential);
                  _showSnack(context, 'Facebook Sign In Success!');
                } else {
                  _showSnack(context, 'Facebook Sign In Cancelled');
                }
              } catch (e) {
                _showSnack(context, 'Facebook Sign In Failed: $e');
              }
            }

            void _handleXaiWalletCreate(BuildContext context) {
              _showSnack(context, 'Create xAI Wallet - Coming Soon!');
            }

            void _showSnack(BuildContext context, String msg) {
              ScaffoldMessenger.of(context).showSnackBar(SnackBar(content: Text(msg)));
            }

            @override
            Widget build(BuildContext context) {
              return Scaffold(
                backgroundColor: const Color(0xFF0A0A0A),
                body: Center(
                  child: Padding(
                    padding: const EdgeInsets.all(24.0),
                    child: Column(
                      mainAxisAlignment: MainAxisAlignment.center,
                      crossAxisAlignment: CrossAxisAlignment.stretch,
                      children: [
                        const Icon(Icons.flash_on, size: 80, color: Color(0xFF00FF88)),
                        const SizedBox(height: 24),
                        const Text('xAI WALLET', textAlign: TextAlign.center, style: TextStyle(fontSize: 32, fontWeight: FontWeight.bold, letterSpacing: 2, color: Colors.white)),
                        const Text('Secure. Fast. Yours.', textAlign: TextAlign.center, style: TextStyle(fontSize: 16, color: Colors.grey)),
                        const SizedBox(height: 50),
                        ElevatedButton.icon(
                          onPressed: () => _handleGoogleSignIn(context),
                          icon: const Icon(Icons.g_mobiledata, color: Colors.black, size: 28),
                          label: const Text('Continue with Google'),
                          style: ElevatedButton.styleFrom(backgroundColor: Colors.white, foregroundColor: Colors.black, padding: const EdgeInsets.symmetric(vertical: 14), shape: RoundedRectangleBorder(borderRadius: BorderRadius.circular(8))),
                        ),
                        const SizedBox(height: 12),
                        ElevatedButton.icon(
                          onPressed: () => _handleFacebookSignIn(context),
                          icon: const Icon(Icons.facebook, color: Colors.white),
                          label: const Text('Continue with Facebook'),
                          style: ElevatedButton.styleFrom(backgroundColor: const Color(0xFF1877F2), foregroundColor: Colors.white, padding: const EdgeInsets.symmetric(vertical: 14), shape: RoundedRectangleBorder(borderRadius: BorderRadius.circular(8))),
                        ),
                        const SizedBox(height: 12),
                        OutlinedButton.icon(
                          onPressed: () => _handleXaiWalletCreate(context),
                          icon: const Icon(Icons.mail, color: Color(0xFF00FF88)),
                          label: const Text('Create xAI Wallet'),
                          style: OutlinedButton.styleFrom(foregroundColor: const Color(0xFF00FF88), side: const BorderSide(color: Color(0xFF00FF88)), padding: const EdgeInsets.symmetric(vertical: 14), shape: RoundedRectangleBorder(borderRadius: BorderRadius.circular(8))),
                        ),
                      ],
                    ),
                  ),
                ),
              );
            }
          }
          EOF

      - name: 8. Build APK
        run: |
          flutter pub get
          flutter build apk --release

      - name: 9. Upload xAI WALLET APK
        uses: actions/upload-artifact@v4
        with:
          name: xAI-WALLET-APK
          path: build/app/outputs/flutter-apk/app-release.apk
          if-no-files-found: error
