name: xAI Wallet

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: 0. Checkout repo
        uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Setup Flutter 3.24
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.24.0'
          channel: 'stable'

      # FIX 1: --overwrite দিয়ে force create করো + android/ios ফোল্ডার regenerate হবে
      - name: 1. Create fresh Flutter project
        run: flutter create --org com.xaiwallet --project-name xai_wallet --platforms android --overwrite .

      # FIX 2: flutter clean + pub get দিয়ে Gradle sync করো
      - name: 2. Clean and get dependencies
        run: |
          flutter clean
          flutter pub get

      - name: 3. Add auth dependencies
        run: |
          flutter pub add firebase_core
          flutter pub add firebase_auth
          flutter pub add google_sign_in
          flutter pub add flutter_facebook_auth

      - name: 4. Write lib/main.dart
        run: |
          cat > lib/main.dart << 'EOF'
