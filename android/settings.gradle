pluginManagement {
    // লোকাল প্রপার্টিজের ঝামেলা নেই, সরাসরি রিলেটিভ পাথ ব্যবহার
    includeBuild("${settingsDir}/../../packages/flutter_tools/gradle")

    repositories {
        google()
        mavenCentral()
        gradlePluginPortal()
    }
}

plugins {
    id "dev.flutter.flutter-gradle-plugin" version "1.0.0" apply false
    id "com.android.application" version "8.3.0" apply false
    id "org.jetbrains.kotlin.android" version "1.9.10" apply false
}

include ":app"
