- name: 2. Update pubspec.yaml with all deps
  run: |
    cat > pubspec.yaml << 'EOF'
    name: xai_wallet
    description: X CHAIN WALLET
    publish_to: 'none'
    version: 1.0.0+1

    environment:
      sdk: '>=3.5.0 <4.0.0'

    dependencies:
      flutter:
        sdk: flutter
      cupertino_icons: ^1.0.8
      firebase_core: ^3.8.0
      firebase_auth: ^5.3.3
      google_sign_in: ^6.2.1
      flutter_facebook_auth: ^7.1.1
      http: ^1.2.2

    dev_dependencies:
      flutter_test:
        sdk: flutter
      flutter_lints: ^3.0.0

    flutter:
      uses-material-design: true
    EOF
