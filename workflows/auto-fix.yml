name: ZAI Mail App

on:
  workflow_dispatch:
  push:
    branches: [ main ]

permissions:
  contents: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Create assets folder
        run: mkdir -p assets

      - name: Create golden ring logo
        run: |
          if [ ! -f assets/logo.png ]; then
            echo "iVBORw0KGgoAAAANSUhEUgAAAOEAAADhCAYAAADHos5ZAAAAAXNSR0IArs4c6QAAAARnQU1BAACxjwv8YQUAAAAJcEhZcwAADsMAAA7DAcdvqGQAAAUxSURBVHja7Z1rY6NIAADTVvj/1z9YQyJbqVJKEyWQS4s5bQpAmzmQJAmG0w8eP7" | base64 -d > assets/logo.png
          fi

      - name: Update pubspec.yaml
        run: |
          if ! grep -q "assets/logo.png" pubspec.yaml; then
            sed -i '/flutter:/a \  assets:\n    - assets/logo.png' pubspec.yaml
            if ! grep -q "flutter:" pubspec.yaml; then
              echo "" >> pubspec.yaml
              echo "flutter:" >> pubspec.yaml
              echo "  uses-material-design: true" >> pubspec.yaml
              echo "  assets:" >> pubspec.yaml
              echo "    - assets/logo.png" >> pubspec.yaml
            fi
          fi

      - name: Create main.dart
        run: |
          mkdir -p lib
          cat > lib/main.dart << 'EOF'
          import 'package:flutter/material.dart';
          import 'package:firebase_auth/firebase_auth.dart';
          import 'package:cloud_firestore/cloud_firestore.dart';

          void main() {
            runApp(MyApp());
          }

          class MyApp extends StatelessWidget {
            @override
            Widget build(BuildContext context) {
              return MaterialApp(
                title: 'ZAI Mail',
                theme: ThemeData(
                  primarySwatch: Colors.blue,
                ),
                home: SplashScreen(),
              );
            }
          }

          class SplashScreen extends StatefulWidget {
            @override
            _SplashScreenState createState() => _SplashScreenState();
          }

          class _SplashScreenState extends State<SplashScreen> {
            @override
            void initState() {
              super.initState();
              Future.delayed(Duration(seconds: 3), () {
                Navigator.pushReplacement(
                  context,
                  MaterialPageRoute(builder: (context) => LoginScreen()),
                );
              });
            }

            @override
            Widget build(BuildContext context) {
              return Scaffold(
                body: Center(
                  child: Image.asset('assets/logo.png'),
                ),
              );
            }
          }

          class LoginScreen extends StatefulWidget {
            @override
            _LoginScreenState createState() => _LoginScreenState();
          }

          class _LoginScreenState extends State<LoginScreen> {
            final _emailController = TextEditingController();
            final _passwordController = TextEditingController();

            @override
            Widget build(BuildContext context) {
              return Scaffold(
                appBar: AppBar(
                  title: Text('Login'),
                ),
                body: Padding(
                  padding: const EdgeInsets.all(20.0),
                  child: Column(
                    children: [
                      TextField(
                        controller: _emailController,
                        decoration: InputDecoration(
                          labelText: 'Email',
                          border: OutlineInputBorder(),
                        ),
                      ),
                      SizedBox(height: 20),
                      TextField(
                        controller: _passwordController,
                        decoration: InputDecoration(
                          labelText: 'Password',
                          border: OutlineInputBorder(),
                        ),
                      ),
                      SizedBox(height: 20),
                      ElevatedButton(
                        onPressed: () {
                          FirebaseAuth.instance.signInWithEmailAndPassword(
                            email: _emailController.text,
                            password: _passwordController.text,
                          ).then((value) {
                            Navigator.pushReplacement(
                              context,
                              MaterialPageRoute(builder: (context) => HomeScreen()),
                            );
                          });
                        },
                        child: Text('Login'),
                      ),
                    ],
                  ),
                ),
              );
            }
          }

          class HomeScreen extends StatefulWidget {
            @override
            _HomeScreenState createState() => _HomeScreenState();
          }

          class _HomeScreenState extends State<HomeScreen> {
            @override
            Widget build(BuildContext context) {
              return Scaffold(
                appBar: AppBar(
                  title: Text('Home'),
                ),
                body: Center(
                  child: Text('Welcome to ZAI Mail'),
                ),
              );
            }
          }
          EOF

      - name: Create Firebase configuration
        run: |
          mkdir -p firebase
          cat > firebase/config.json << 'EOF'
          {
            "apiKey": "YOUR_API_KEY",
            "appId": "YOUR_APP_ID",
            "projectId": "YOUR_PROJECT_ID",
            "storageBucket": "YOUR_STORAGE_BUCKET",
            "messagingSenderId": "YOUR_MESSAGING_SENDER_ID",
            "measurementId": "YOUR_MEASUREMENT_ID"
          }
          EOF

      - name: Deploy to Firebase
        uses: FirebaseExtended/action-hosting-deploy@v1
        with:
          repoToken: ${{ secrets.FIREBASE_TOKEN }}
          projectId: YOUR_PROJECT_ID
          appId: YOUR_APP_ID
          messagingSenderId: YOUR_MESSAGING_SENDER_ID
          measurementId: YOUR_MEASUREMENT_ID
